<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Items Management</title>
    <link rel="stylesheet" href="items.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>
<body>

<h1>Items Management</h1>

<h2>Add / Edit Item</h2>

<form id="itemForm">
    <input type="hidden" id="editingId">

    <label>Item ID:</label>
    <input type="text" id="itemId" required>

    <label>Item Name:</label>
    <input type="text" id="itemName" required>

    <label>Category:</label>
    <input type="text" id="category">

    <label>Price:</label>
    <input type="number" id="price" required>

    <label>In Stock:</label>
    <select id="stock" required>
        <option value="">Select</option>
        <option value="true">Yes</option>
        <option value="false">No</option>
    </select>

    <button type="submit" id="submitBtn">Add Item</button>
</form>

<h2>Items List</h2>

<table id="itemsTable">
    <thead>
        <tr>
            <th>Item ID</th>
            <th>Name</th>
            <th>Category</th>
            <th>Price</th>
            <th>Stock</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<script>
// connect to supabase
const client = supabase.createClient(
    "https://sjxpsfgxngsowdvrstrt.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNqeHBzZmd4bmdzb3dkdnJzdHJ0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzOTQwODQsImV4cCI6MjA5MDk3MDA4NH0.ZREXklbIesukIqHpMYb5CtBX_wxR5CoCAEuTtKNVg5w"
);

const form = document.getElementById("itemForm");
const table = document.querySelector("#itemsTable tbody");
const submitBtn = document.getElementById("submitBtn");
const editingId = document.getElementById("editingId");

// LOAD ITEMS
async function loadItems() {
    table.innerHTML = "";

    let { data, error } = await client.from("items").select("*");

    if (error) {
        table.innerHTML = "<tr><td colspan='6'>Error loading data</td></tr>";
        return;
    }

    data.forEach(item => {

        let id = item.item_id || item.id || item.Item_ID;
        let name = item.item_name || item.name || item.Item_Name;
        let price = item.price || item.Price;
        let stock = item.in_stock ?? item.stock ?? item.In_Stock;

        let row = document.createElement("tr");

        row.innerHTML = `
            <td>${id}</td>
            <td>${name}</td>
            <td>-</td>
            <td>€${price}</td>
            <td>${stock == true || stock == "Yes" || stock == 1 ? "Yes" : "No"}</td>
            <td>
                <button onclick="editItem('${id}', '${name}', '${price}', '${stock}')">Edit</button>
                <button onclick="deleteItem('${id}')">Delete</button>
            </td>
        `;

        table.appendChild(row);
    });
}

// ADD OR UPDATE
form.addEventListener("submit", async function(e) {
    e.preventDefault();

    let id = document.getElementById("itemId").value;
    let name = document.getElementById("itemName").value;
    let category = document.getElementById("category").value;
    let price = document.getElementById("price").value;
    let stock = document.getElementById("stock").value === "true";

    if (editingId.value) {
        // UPDATE
        await client.from("items")
            .update({
                item_name: name,
                price: price,
                in_stock: stock
            })
            .eq("item_id", editingId.value);

        submitBtn.textContent = "Add Item";
        editingId.value = "";
    } else {
        // ADD
        await client.from("items").insert([{
            item_id: id,
            item_name: name,
            price: price,
            in_stock: stock
        }]);
    }

    form.reset();
    loadItems();
});

// DELETE
async function deleteItem(id) {
    await client.from("items").delete().eq("item_id", id);
    loadItems();
}

// EDIT
function editItem(id, name, price, stock) {
    document.getElementById("itemId").value = id;
    document.getElementById("itemName").value = name;
    document.getElementById("price").value = price;
    document.getElementById("stock").value = (stock == true || stock == "Yes" || stock == 1) ? "true" : "false";

    editingId.value = id;
    submitBtn.textContent = "Update Item";
}

// LOAD ON START
loadItems();
</script>

</body>
</html>
