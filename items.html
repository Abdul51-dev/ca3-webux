<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Items Management</title>

    <link rel="stylesheet" href="items.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>

<body>

<h1>Items Management</h1>
<h2>Add / Edit Item</h2>

<form id="itemForm">
    <input type="hidden" id="editingId">

    <label>Item ID:</label>
    <input type="text" id="itemId" required>

    <label>Item Name:</label>
    <input type="text" id="itemName" required>

    <label>Category:</label>
    <input type="text" id="category" placeholder="Not linked yet">

    <label>Price:</label>
    <input type="number" id="price" required>

    <label>In Stock:</label>
    <select id="stock" required>
        <option value="">Select</option>
        <option value="true">Yes</option>
        <option value="false">No</option>
    </select>

    <button type="submit" id="submitBtn">Add Item</button>
</form>

<h2>Items List</h2>

<table id="itemsTable">
    <thead>
        <tr>
            <th>Item ID</th>
            <th>Name</th>
            <th>Category</th>
            <th>Price</th>
            <th>Stock</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        <tr><td colspan="6">Loading data...</td></tr>
    </tbody>
</table>

<script>

// CLIENT
const client = supabase.createClient(
    "https://sjxpsfgxngsowdvrstrt.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNqeHBzZmd4bmdzb3dkdnJzdHJ0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzOTQwODQsImV4cCI6MjA5MDk3MDA4NH0.ZREXklbIesukIqHpMYb5CtBX_wxR5CoCAEuTtKNVg5w"
);

const form = document.getElementById("itemForm");
const tableBody = document.querySelector("#itemsTable tbody");
const submitBtn = document.getElementById("submitBtn");
const editingId = document.getElementById("editingId");

// LOAD ITEMS
async function loadItems() {
    tableBody.innerHTML = "<tr><td colspan='6'>Loading data...</td></tr>";

    try {
        const { data, error } = await client.from("items").select("*");

        if (error) {
            tableBody.innerHTML = "<tr><td colspan='6'>Error loading data</td></tr>";
            return;
        }

        if (!data || data.length === 0) {
            tableBody.innerHTML = "<tr><td colspan='6'>No items found</td></tr>";
            return;
        }

        tableBody.innerHTML = "";

        data.forEach(item => {
            const id = item.item_id || item.Item_ID || "";
            const name = item.item_name || item.Item_Name || "";
            const category = item.category || item.Category || "-";
            const price = item.price || item.Price || "";
            const stock = item.in_stock ?? item.In_Stock ?? false;

            const badge = stock ? "badge-yes" : "badge-no";
            const stockText = stock ? "Yes" : "No";

            const row = document.createElement("tr");

            row.innerHTML = `
                <td>${id}</td>
                <td>${name}</td>
                <td>${category}</td>
                <td>€${price}</td>
                <td><span class="${badge}">${stockText}</span></td>
                <td>
                    <button onclick="editItem('${id}','${name}','${price}','${stock}')">Edit</button>
                    <button onclick="deleteItem('${id}')">Delete</button>
                </td>
            `;

            tableBody.appendChild(row);
        });

    } catch (err) {
        tableBody.innerHTML = "<tr><td colspan='6'>Connection error</td></tr>";
    }
}

// ADD / UPDATE
form.addEventListener("submit", async function(e) {
    e.preventDefault();

    const id = document.getElementById("itemId").value;
    const name = document.getElementById("itemName").value;
    const category = document.getElementById("category").value;
    const price = document.getElementById("price").value;
    const stock = document.getElementById("stock").value === "true";

    // ✅ VALIDATION (NEW)
    if (price <= 0) {
        alert("Price must be greater than 0");
        return;
    }

    if (!id || !name) {
        alert("Fill all required fields");
        return;
    }

    if (editingId.value) {
        await client.from("items")
            .update({
                item_name: name,
                price: price,
                in_stock: stock
            })
            .eq("item_id", editingId.value);

        submitBtn.textContent = "Add Item";
        editingId.value = "";

    } else {
        await client.from("items").insert([{
            item_id: id,
            item_name: name,
            category: category,
            price: price,
            in_stock: stock
        }]);
    }

    form.reset();
    loadItems();
});

// DELETE
async function deleteItem(id) {
    await client.from("items").delete().eq("item_id", id);
    loadItems();
}

// EDIT
function editItem(id, name, price, stock) {
    document.getElementById("itemId").value = id;
    document.getElementById("itemName").value = name;
    document.getElementById("price").value = price;
    document.getElementById("stock").value = stock ? "true" : "false";

    editingId.value = id;
    submitBtn.textContent = "Update Item";
}

// RUN
loadItems();

</script>

</body>
</html>
